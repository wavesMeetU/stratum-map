<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stratum-map — GPU picking demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.8.0/ol.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0f1419;
        color: #e6edf3;
        min-height: 100vh;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 14px;
        border-bottom: 1px solid #30363d;
        background: #161b22;
      }
      header h1 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      header p {
        margin: 0;
        font-size: 0.82rem;
        color: #8b949e;
        max-width: 70ch;
      }
      #panel {
        padding: 10px 14px;
        background: #12151c;
        border-bottom: 1px solid #30363d;
        font-size: 0.85rem;
        min-height: 4.5rem;
      }
      #panel .mono {
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        white-space: pre-wrap;
        word-break: break-all;
        color: #7ee787;
      }
      #panel .muted {
        color: #8b949e;
      }
      #panel .err {
        color: #f85149;
      }
      #map-wrap {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .ol-viewport canvas {
        outline: none;
      }
      #gpu-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>GPU picking — WebGPU + OpenLayers</h1>
        <p>Click the map (not the tiles UI) to run a single-pixel GPU pick. Selected vertex uses highlight style; metadata comes from <code>FeatureStore</code>.</p>
      </header>
      <div id="panel">
        <div class="muted" id="panel-placeholder">Initializing…</div>
      </div>
      <div id="map-wrap">
        <div id="map"></div>
        <canvas id="gpu-canvas" width="300" height="150" aria-hidden="true"></canvas>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
