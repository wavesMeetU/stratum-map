<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stratum-map — flagship demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.8.0/ol.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f1419;
        color: #e6edf3;
        min-height: 100vh;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        flex: 0 0 auto;
        padding: 10px 14px;
        border-bottom: 1px solid #30363d;
        background: #161b22;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px 20px;
      }
      header h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        width: 100%;
      }
      .stat {
        font-variant-numeric: tabular-nums;
        font-size: 0.85rem;
        color: #8b949e;
      }
      .stat strong {
        color: #58a6ff;
      }
      .err {
        color: #f85149;
      }
      #controls {
        display: flex;
        flex-wrap: wrap;
        gap: 14px 20px;
        align-items: flex-end;
        padding: 10px 14px;
        background: #12151c;
        border-bottom: 1px solid #30363d;
      }
      .ctl {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ctl label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8b949e;
      }
      .ctl input[type="range"] {
        width: 140px;
      }
      .ctl input[type="color"] {
        width: 48px;
        height: 28px;
        border: 1px solid #30363d;
        border-radius: 4px;
        padding: 0;
        background: transparent;
      }
      #map-wrap {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      #map {
        position: relative;
        z-index: 0;
        width: 100%;
        height: 100%;
      }
      .ol-viewport canvas {
        outline: none;
      }
      #gpu-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>stratum-map — WebGPU points + OpenLayers</h1>
        <span class="stat" id="stat-fps">FPS: —</span>
        <span class="stat" id="stat-points">Points: —</span>
        <span class="stat" id="stat-frame">Frame: — ms</span>
        <span class="stat" id="stat-webgpu">WebGPU: …</span>
      </header>
      <div id="controls">
        <div class="ctl">
          <label for="pt-count">Point count</label>
          <input id="pt-count" type="range" min="50000" max="2000000" step="10000" value="200000" />
          <span id="pt-count-val" style="font-size: 0.8rem; color: #8b949e">200000</span>
        </div>
        <div class="ctl">
          <label>Style A color</label>
          <input id="col-a" type="color" value="#1a8cff" />
        </div>
        <div class="ctl">
          <label>Style B color</label>
          <input id="col-b" type="color" value="#ff6b35" />
        </div>
        <div class="ctl">
          <label for="size-a">Style A size (px)</label>
          <input id="size-a" type="range" min="2" max="24" step="1" value="7" />
          <span id="size-a-val" style="font-size: 0.8rem; color: #8b949e">7</span>
        </div>
        <div class="ctl">
          <label for="size-b">Style B size (px)</label>
          <input id="size-b" type="range" min="2" max="24" step="1" value="6" />
          <span id="size-b-val" style="font-size: 0.8rem; color: #8b949e">6</span>
        </div>
        <div class="ctl">
          <label>&nbsp;</label>
          <button id="btn-regen" type="button" style="padding: 6px 12px; cursor: pointer; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #e6edf3">Regenerate points</button>
        </div>
      </div>
      <div id="map-wrap">
        <div id="map"></div>
        <canvas id="gpu-canvas" width="300" height="150" aria-hidden="true"></canvas>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
