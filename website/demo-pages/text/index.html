<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stratum-map — GPU text labels demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.8.0/ol.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0f1419;
        color: #e6edf3;
        min-height: 100vh;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 14px;
        border-bottom: 1px solid #30363d;
        background: #161b22;
      }
      header h1 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      header p {
        margin: 0;
        font-size: 0.82rem;
        color: #8b949e;
        max-width: 78ch;
      }
      #controls {
        padding: 10px 14px;
        background: #12151c;
        border-bottom: 1px solid #30363d;
        font-size: 0.85rem;
        display: flex;
        flex-wrap: wrap;
        gap: 12px 18px;
        align-items: center;
      }
      #controls label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #c9d1d9;
      }
      #controls .group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        align-items: center;
      }
      #label-stats {
        flex: 1 1 200px;
        min-width: 0;
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        color: #7ee787;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #map-wrap {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .ol-viewport canvas {
        outline: none;
      }
      #gpu-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        display: block;
      }
      #declutter-debug-layer {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        overflow: hidden;
      }
      #declutter-debug-layer div {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>GPU text labels — WebGPU + OpenLayers</h1>
        <p>
          In-view points become <code>TextLabel</code> strings (glyph instances). Toggle <strong>bitmap</strong> vs
          <strong>MSDF</strong> atlas, optional screen-space <strong>declutter</strong>, and collision debug boxes.
        </p>
      </header>
      <div id="controls">
        <div class="group">
          <label><input type="checkbox" id="show-labels" checked /> Show labels</label>
          <span style="color: #8b949e">Atlas</span>
          <label><input type="radio" name="atlas" id="text-atlas-bitmap" value="bitmap" checked /> Bitmap</label>
          <label><input type="radio" name="atlas" id="text-atlas-msdf" value="msdf" /> MSDF</label>
        </div>
        <div class="group">
          <label><input type="checkbox" id="declutter-enabled" /> Declutter</label>
          <label><input type="checkbox" id="declutter-debug-show" /> Debug boxes</label>
        </div>
        <div id="label-stats"></div>
      </div>
      <div id="map-wrap">
        <div id="map"></div>
        <canvas id="gpu-canvas" width="300" height="150" aria-hidden="true"></canvas>
        <div id="declutter-debug-layer" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
