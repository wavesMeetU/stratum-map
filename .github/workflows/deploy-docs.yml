name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "src/**"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root dependencies (library + Vite for flagship bundle)
        run: npm ci

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build Docusaurus (prebuild runs flagship demo bundle)
        working-directory: website
        run: npm run build

      # GitHub Pages may run Jekyll on uploaded files; empty .nojekyll disables it so
      # sitemap.xml and other assets are served raw (not wrapped as HTML).
      - name: Ensure .nojekyll at site root
        run: touch website/build/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
